const keys = Object.keys(SEQUENCES);
let results = {};
let ok = 0, fail = 0;

function log(msg, color) {
  const d = document.getElementById("log");
  const line = document.createElement("div");
  line.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
  if (color) line.style.color = color;
  d.appendChild(line);
  d.scrollTop = d.scrollHeight;
}

function updateUI(current) {
  const pct = Math.round((current / keys.length) * 100);
  document.getElementById("bar").style.width = pct + "%";
  document.getElementById("bar").textContent = pct + "%";
  document.getElementById("statOk").textContent = "OK: " + ok;
  document.getElementById("statFail").textContent = "Erreurs: " + fail;
  document.getElementById("statPending").textContent = "Restant: " + (keys.length - current);
}

async function fetchRoute(stops) {
  const coords = stops.map(s => s[1] + "," + s[0]).join(";");
  const url = "https://router.project-osrm.org/route/v1/driving/" + coords + "?overview=full&geometries=geojson&steps=false";
  const resp = await fetch(url);
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const data = await resp.json();
  if (data.code !== "Ok" || !data.routes || !data.routes[0]) throw new Error("OSRM error: " + data.code);
  const route = data.routes[0];
  const path = route.geometry.coordinates.map(c => [Math.round(c[1]*1e5)/1e5, Math.round(c[0]*1e5)/1e5]);
  const legDists = route.legs.map(l => Math.round(l.distance));
  return { path, legDists };
}

async function startBuild() {
  document.getElementById("startBtn").disabled = true;
  log("Demarrage du build pour " + keys.length + " routes...", "#F47920");
  
  for (let i = 0; i < keys.length; i++) {
    const key = keys[i];
    const stops = SEQUENCES[key];
    const nStops = stops.length;
    
    try {
      const result = await fetchRoute(stops);
      results[key] = result;
      ok++;
      log("[" + (i+1) + "/" + keys.length + "] OK - " + nStops + " arrets, " + result.path.length + " points", "#4caf50");
    } catch(e) {
      fail++;
      log("[" + (i+1) + "/" + keys.length + "] ERREUR: " + e.message, "#f44336");
      // Retry once after longer delay on 429
      if (e.message.includes("429")) {
        log("  Rate limited - attente 5s puis retry...", "#ff9800");
        await new Promise(r => setTimeout(r, 5000));
        try {
          const result = await fetchRoute(stops);
          results[key] = result;
          ok++;
          fail--;
          log("  Retry OK!", "#4caf50");
        } catch(e2) {
          log("  Retry echoue: " + e2.message, "#f44336");
        }
      }
    }
    
    updateUI(i + 1);
    
    // Delay between requests to avoid rate limiting
    if (i < keys.length - 1) {
      await new Promise(r => setTimeout(r, 1500));
    }
  }
  
  log("", "");
  log("BUILD TERMINE! " + ok + " routes OK, " + fail + " erreurs", "#F47920");
  log("Taille: " + Math.round(JSON.stringify(results).length / 1024) + "KB", "#F47920");
  document.getElementById("dlBtn").disabled = false;
}

function downloadResult() {
  const json = JSON.stringify(results);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "routes-cache.json";
  a.click();
  URL.revokeObjectURL(url);
  log("Fichier telecharge!", "#4caf50");
}
